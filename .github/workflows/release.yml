name: release

# Push a tag like v0.1.0 and this builds the signed release APK and attaches
# it to a GitHub Release. Signing material and the Firebase config live in
# repository secrets; none of it is in the repo.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the annotated tag's message is available for the notes.
          fetch-depth: 0

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v6

      - name: Materialize signing and Firebase config
        run: |
          echo "${{ secrets.CHAINCHECK_KEYSTORE_B64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > composeApp/google-services.json

      - name: Build signed release APK
        env:
          CHAINCHECK_KEYSTORE: ${{ runner.temp }}/release.keystore
          CHAINCHECK_KEYSTORE_PASSWORD: ${{ secrets.CHAINCHECK_KEYSTORE_PASSWORD }}
          CHAINCHECK_KEY_ALIAS: chaincheck
          CHAINCHECK_KEY_PASSWORD: ${{ secrets.CHAINCHECK_KEYSTORE_PASSWORD }}
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: ./gradlew :composeApp:assembleRelease

      - name: Name the artifacts
        run: |
          apk=composeApp/build/outputs/apk/release/composeApp-release.apk
          # Versioned copy for the release history, and a stable-named copy so
          # releases/latest/download/chaincheck.apk is a permanent direct link.
          cp "$apk" "chaincheck-${GITHUB_REF_NAME}.apk"
          cp "$apk" "chaincheck.apk"

      - name: Compose release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="$GITHUB_REF_NAME"
          # One-line human summary: the annotated tag's subject line. Tag releases
          # with a plain-language message, e.g. git tag -a v0.1.3 -m "Adds offline mode".
          summary="$(git tag -l --format='%(contents:subject)' "$tag")"
          [ -z "$summary" ] && summary="See the full changelog below."
          # Developer-facing changelog, generated the same way --generate-notes does.
          changelog="$(gh api "repos/${GITHUB_REPOSITORY}/releases/generate-notes" \
            -f tag_name="$tag" --jq .body)"
          {
            cat .github/release-body-header.md
            echo
            echo "## What's new"
            echo
            echo "$summary"
            echo
            echo "<details><summary>Full technical changelog</summary>"
            echo
            echo "$changelog"
            echo
            echo "</details>"
          } > release-notes.md

      - name: Create GitHub Release with the APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            "chaincheck-${GITHUB_REF_NAME}.apk" \
            "chaincheck.apk" \
            --title "ChainCheck $GITHUB_REF_NAME" \
            --notes-file release-notes.md
